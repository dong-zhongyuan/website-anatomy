以保守治疗，包括超声引导下梨状肌局部封闭注射、冲击波疗法及特定拉伸训练。治疗2周后症状显著改善，4周后疼痛基本消失，恢复正常军事训练。随访半年无复发。", "questions": ["1．试分析患者所出现相关症状的结构基础。", "2．如何预防军事训练所致小腿前骨筋膜间隙综合征？"]}, {"description": "患者，男性，28岁。在战术训练中跳跃障碍后不慎左膝扭伤，即刻感到剧痛、弹响，无法承重。查体见膝关节迅速肿胀，前抽屉试验及Lachman试验均呈阳性，提示前向不稳。MRI 检查证实为左膝前交叉韧带完全断裂，并伴有内侧半月板桶柄样撕裂。随即接受膝关节镜手术治疗：取同侧腘绳肌肌腱重建前交叉韧带，并对撕裂的半月板行缝合修复术。术后遵循系统康复计划。一年后随访，患者膝关节稳定性恢复良好，可完成慢跑等基础活动，但未恢复高强度军事训练。", "questions": ["1．试分析梨状肌综合征的人体结构基础。", "2．如何预防军事训练所致梨状肌综合征？"]}, {"description": "患者，男性，19岁。在翻越障碍的训练过程中失去平衡，下颌不慎磕碰到障碍物边缘。当即感剧烈疼痛，口腔内出血，下唇肿胀，张口受限。伴左侧下颌磨牙区麻木，提示神经损伤。送医检查见颏部软组织挫裂伤，左侧颏孔区压痛显著，影像学显示下颌骨颏部线性骨折，累及颏神经。诊断为“下颌骨骨折伴颏神经损伤”。急诊行清创缝合及颌间结扎固定术，控制出血与水肿。因血运丰富，创口愈合较快，但神经功能需长期随访。", "questions": ["1．膝关节镜下如何分辨前、后交叉韧带和内、外侧半月板？", "2．如何在军事训练中避免损伤膝关节？"]}, {"description": "患者，男性，22岁。在战术训练中不慎前额右侧受到撞击，导致颅顶出现长约4cm的撕裂伤，出血活跃。后送医疗所检查发现，创口深及帽状腱膜下层，因该层结构疏松，已形成向前额扩散的血肿，并伴上眼睑瘀斑。军医立即清理伤口，缝合帽状腱膜以减少皮肤张力，同时实施头皮神经阻滞麻醉。术后予抗感染治疗，伤口一期愈合。", "questions": ["1．面部的神经分布如何？患者出现相应症状的结构基础如何？", "2．如何避免军事训练所致颌面部撞击伤？"]}, {"description": "某部战士，男性，22岁。在野外战术训练后出现颈部疼痛、活动受限，伴低热（体温约37.6℃）。初按训练伤处理后症状持续，转至体系医院。查体见颈前区压痛，MRI显示C4-C5平面椎前间隙弥漫性肿胀并高信号，血象正常。结合其训练环境中可能存在特殊病原体接触史，诊断为“颈部椎前间隙感染”。经静脉给予头孢曲松联合甲硝唑抗感染治疗10天，症状显著缓解，复查影像学显示椎前间隙厚度由11mm降至6mm。随访3个月无复发，战士恢复战备岗位。", "questions": ["1．试分析颅顶软组织层次特点对战创伤出血控制、血肿范围判断及麻醉方式选择的影响。", "2．如何预防军事训练所致颅顶软组织损伤？"]}, {"description": "某部战士在遭遇爆炸现场后，因吸入高温烟雾及冲击波损伤，出现急性喉头水肿导致川度呼吸困难。现场军医迅速评估伤情：伤员面色紫绀，出现三凹征，血氧饱和度持续下降至78％。立即决定实施气管切开术，采用气管撑开器纵向切开选定的软骨环，置入气管套管后血氧饱和度回升至95％。术后严格固定套管，紧急后送。", "questions": ["1．椎前间隙的位置和交通如何？", "2．根据病例中提供的影像学描述，提示感染可能来源于何处？"]}, {"description": "某部战士，男性，23岁。在一次高空索降训练中，不慎从高处坠落，右肩部着地，造成锁骨骨折、肱骨近端粉碎性骨折伴出血，随训卫勤人员迅速前出救治，在其锁骨上窝实施超声引导下臂丛神经阻滞麻醉，快速实现患侧上肢镇痛。同期完成锁骨下静脉穿刺置管，快速输注胶体液及血管活性药物。后送途中伤员生命体征趋于平稳。至野战医院手术探查，确认臂丛神经结构完整，但穿刺区域可见轻度血肿。对锁骨和肱骨实施复位内固定，术后伤员康复良好。", "questions": ["1．实施气管切开术的部位如何选择？术中应注意哪些问题？", "2．如果切口过高或过低，分别可能损伤哪些毗邻结构并引发何种并发症？"]}, {"description": "在对越自卫反击战的一次攻坚战斗中，一名战士在冲锋时被敌弹击中左肩部，导致大出血并迅速休克。战友立即为其应用止血带，并快速后送。团救护所军医经检伤，判断该战士为腋动脉断裂合并臂丛神经损伤。在野战医院手术中，采用标准腋部切口，沿喙肱肌内侧缘入路，迅速显露并修复断裂的血管，同时对受损神经进行清创吻合。术后伤员生命体征平稳，肢体血运恢复。", "questions": ["1．臂丛与锁骨下静脉的毗邻位置如何？", "2．若在极端战场条件下无法获得超声设备，实施盲穿或根据体表标志进行穿刺时，术者应依靠哪些关键的结构来定位？"]}, {"description": "患者，男性，25岁，军事训练中不慎从高处坠落，右手着地致伤。查体见右肘部肿胀、疼痛、活动受限，生命体征平稳。专科检查发现其拇指、食指、中指及环指桡侧半存在麻木感与疼痛，握物无力。X线检查提示右肱骨髁上骨质连续性中断，断端错位。综合诊断为右肱骨髁上骨折合并神经损伤。", "questions": ["1．术中选择“沿喙肱肌内侧缘”的切口入路显露腋窝的血管神经，试阐述从皮肤到显露血管神经束所需经过的层次结构。", "2．如该伤员术后出现肩关节外展无力（“方肩”畸形）和臂外侧皮肤感觉麻木，提示哪条神经可能受损？"]}, {"description": "患者，男性，36岁。在一次野外战术训练中匍匐通过低桩网时，右手示指掌指关节处被地面尖锐碎石刺伤。伤口初期作简单包扎，三日后出现红肿热痛。入院检查示指及全手肿胀，以手背为甚，沿屈肌腱鞘走行区压痛明显，被动伸指引发剧痛，确诊为急性示指屈肌腱鞘炎。经急诊行腱鞘切开引流，十日后感染蔓延至鱼际间隙，出现局部波动性肿痛。经二次手术引流鱼际间隙，并加强抗生素治疗后，患者手部功能最终完全恢复。", "questions": ["1．试根据症状分析哪条神经可能受累？", "2．面对“肱骨髁上骨折合并神经损伤”的伤员，在野战或训练基地条件下，应优先尝试手法复位石膏固定，还是建议后送行手术治疗？请从神经功能恢复的紧迫性、固定稳定性、后送条件等军事医学角度，阐述你的决策依据和初期处理要点。"]}, {"description": "患者，男性，32岁。在进行战术攀爬训练时，因动作失衡，左肩骤然受力拉伤，当即感到剧烈疼痛与活动受限。次日检查见左肱骨大结节压痛明显，肩关节外展无力，落臂征阳性。MRI 确诊为冈上肌肌腱完全断裂。经关节镜下双排铆钉缝合修复术后，予以前臂吊带固定4周，并系统进行冷疗及渐进式功能康复。术后3个月，患者肩关节功能基本恢复，可重返基础军事训练。", "questions": ["1．试分析示指屈肌腱鞘炎感染蔓延至鱼际间隙的可能途径。", "2．两次手术的切口部位应如何选择？"]}, {"description": "患者，男性，22岁。在一次部队演习中，重复进行快速装填炮弹动作。近期出现右肘内侧持续性疼痛，伴小指麻木。体检发现肘内侧明显压痛，尺神经Tinel征阳性。MRI显示尺侧副韧带部分撕裂及内上髁骨髓水肿。诊断为投掷肘（内侧型损伤），经休制、物理治疗及专项动作模式调整后症状缓解。", "questions": ["1．试分析该案例中肩关节镜手术所经过的层次结构。", "2．术中应注意保护哪些重要的神经血管结构？"]}, {"description": "患者，男性，23岁。在一次部队实战化越野训练中，跨越障碍时右胸不慎受到撞击，出现呼吸困难。随训军医查体发现右胸呼吸音消失，判断为张力性气胸。立即实施胸膜腔穿刺术。穿刺后气体溢出，症状缓解，随后改行闭式引流。后送确诊为第5、6肋骨骨折伴气胸。", "questions": ["1．试分析案例中尺神经受累的结构基础。", "2．哪些军事训练或战术动作存在导致“投掷肘”的风险？如何预防？"]}, {"description": "患者，男性，35岁，某空降兵营长。在完成高强度实兵对抗演习后，突发前胸及背部撕裂样剧痛。随队军医检查发现其双侧桡动脉搏动不对称，血压显著升高，野战医疗所床旁超声快速提示Stanford A型胸主动脉夹层，立即实施损伤控制性救治：严格控制血压及心率以遏制夹层扩展，并给予强力镇痛。随后，在严密监护下通过医疗救援直升机将伤员后送至战略支援医院，最终成功接受主动脉置换手术。", "questions": ["1．该案例中针对张力性气胸的胸膜腔穿刺部位如何选择？穿刺时应注意避免损伤哪些结构？", "2．如患者合并胸膜腔积液，如何选择穿刺部位？"]}, {"description": "患者，男性，35岁。在一次战术演练中快速通过低桩网时，腹部不慎撞击障碍物边缘。当即感到腹部剧痛，随训军医查体发现腹壁局部肿胀，但无明显腹膜刺激征，初步判断为腹壁挫伤。后送附近部队医院，超声检查提示腹直肌鞘血肿，排除腹腔内脏损伤。伤员在保守治疗期间，因剧烈咳嗽导致腹内压骤增，于脐环处形成可复性包块，确诊为创伤后继发性脐疝。", "questions": ["1．试分析患者双侧桡动脉搏动不对称的结构基础。", "2．如该夹层动脉瘤持续扩张或破裂，可能压迫纵隔内的哪些重要结构？请列举至少三个毗邻结构，并说明其可能出现的临床症状 }else{
ans[k]=idx;
sv();
doGrade();
}
};

window.doGrade=function(){
var k=cm+'_'+ci;
if(ans[k+'_g']!==undefined)return;
var q=data()[ci];
var ua=ans[k];
var ok=isCorrect(q.answer,ua);
ans[k+'_g']=ok;graded++;
if(ok)correct++;
else{
var we={m:cm,i:ci,q:q.question,o:cm==='small'?q.options:null,a:ua,t:new Date().toISOString()};
if(!WL.some(function(w){return w.m===we.m&&w.i===we.i;}))WL.push(we);
}
us();sv();show();
if(cm==='small')setTimeout(function(){if(cm==='small')nx();},650);
};

function data(){return gd();}

function show(){
if(cm==='wrong'){showWL();return;}
var d=data();if(d.length===0){document.getElementById('main').innerHTML='<p style="text-align:center;padding:50px;color:#999">暂无数据</p>';return;}
if(ci>=d.length)ci=0;
markSeen();
var item=d[ci];var sk=cm+'_'+ci;var sa=ans[sk];var gd2=ans[sk+'_g'];
var h='<div class="qc'+(gd2===true?' ok':gd2===false?' ng':'')+'">';
h+='<div class="qh">第'+(ci+1)+'题 / 共'+d.length+'题</div>';

if(cm==='small'){
h+='<div class="qt">'+item.question+'</div>';
var isMulti=Array.isArray(item.answer);
for(var i=0;i<item.options.length;i++){
var sel=isMulti?(Array.isArray(sa)&&sa.indexOf(i)>=0):(sa===i||sa===String(i));
var cls='op';var mark='';
if(gd2===true){
if(isCorrect(item.answer,[i])||(!isMulti&&sa===i)){cls='op cok';mark='✓';}
}else if(gd2===false){
var ca=item.answer;
if((!isMulti&&i===ca)||(isMulti&&Array.isArray(ca)&&ca.indexOf(i)>=0)){cls='op cok';mark='✓';}
else if(sel){cls='op cng';mark='✗';}
}else if(sel){cls='op sel';}
h+='<div class="'+cls+'" onclick="so('+i+')">'+item.options[i]+'<span class="mark">'+mark+'</span></div>';
}
if(gd2!==undefined){
h+='<div style="margin-top:15px;padding:10px;background:'+(gd2?'#e8f5e9':'#ffe0e0')+';border-radius:6px;font-weight:bold;color:'+(gd2?'#27ae60':'#e74c3c')+'">'+(gd2?'✓ 回答正确！':'✗ 回答错误')+'</div>';
}
}else if(cm==='big'){
h+='<div class="qt">'+item.question+'</div>';
h+='<div class="ta"><textarea id="bigta" placeholder="请输入答案..." oninput="saveBig()">'+(sa||'')+'</textarea></div>';
if(sa&&gd2===undefined){
h+='<div style="margin-top:20px;padding:15px;background:#fff;border-radius:6px;border:1px dashed #ddd;text-align:center"><p style="margin-bottom:10px;font-weight:bold">确认正确？</p><button class="bt bt-s" onclick="doGrade()">✓ 做对了</button><button class="bt bt-d" onclick="doGradeWrong()">✗ 做错了</button></div>';
}
}else{
h+='<div class="cs">'+item.description+'</div>';
h+='<div style="font-weight:bold;color:#e67e22;margin:15px 0">问题讨论：</div>';
for(var j=0;j<item.questions.length;j++){
h+='<div class="cq"><h4>'+item.questions[j]+'</h4><textarea class="cta" data-cq="'+j+'" placeholder="请输入答案..." style="width:100%;min-height:80px;padding:10px;border:1px solid #ddd;border-radius:4px;font-size:14px" oninput="saveCase('+j+')">'+(ans[cm+'_'+ci+'_'+j]||'')+'</textarea></div>';
}
if(sa&&gd2===undefined){
h+='<div style="margin-top:20px;padding:15px;background:#fff;border-radius:6px;border:1px dashed #ddd;text-align:center"><p style="margin-bottom:10px;font-weight:bold">确认正确？</p><button class="bt bt-s" onclick="doGrade()">✓ 做对了</button><button class="bt bt-d" onclick="doGradeWrong()">✗ 做错了</button></div>';
}
}
h+='</div>';
document.getElementById('main').innerHTML=h;
}

window.saveBig=function(){var t=document.getElementById('bigta');if(t){ans[cm+'_'+ci]=t.value;sv();}};
window.saveCase=function(idx){var t=document.querySelector('[data-cq="'+idx+'"]');if(t){ans[cm+'_'+ci+'_'+idx]=t.value;sv();}};
window.doGradeWrong=function(){var k=cm+'_'+ci;ans[k+'_g']=false;graded++;ans[k+'_g']=false;var q=data()[ci];var we={m:cm,i:ci,q:q.question,o:null,a:ans[k],t:new Date().toISOString()};if(!WL.some(function(w){return w.m===we.m&&w.i===we.i;}))WL.push(we);us();sv();show();};

// 模式切换
document.getElementById('ms').addEventListener('click',function(e){var el=e.target.closest('[data-m]');if(!el)return;cm=el.dataset.m;document.querySelectorAll('.mb').forEach(function(b){b.classList.remove('ac')});el.classList.add('ac');if(cm==='wrong')showWL();else{pickRandom();show();}});

function showWL(){
if(WL.length===0){document.getElementById('main').innerHTML='<p style="text-align:center;padding:80px;color:#27ae60;font-size:18px">🎉 无错题！继续保持！</p>';return;}
var h='<h3 style="margin-bottom:20px;color:#e74c3c">错题本（'+WL.length+'题）</h3>';
WL.forEach(function(w,i){var mn={small:'小题',big:'大题',case:'案例'}[w.m]||w.m;
h+='<div class="wi" onclick="reviewW('+i+')"><div>'+(i+1)+'. '+w.q.substring(0,80)+'</div><div class="wt">'+mn+' · '+new Date(w.t).toLocaleString()+'</div></div>';});
document.getElementById('main').innerHTML=h;
}

window.reviewW=function(idx){var w=WL[idx];cm=w.m;ci=w.i;document.querySelectorAll('.mb').forEach(function(b){b.classList.remove('ac')});var t=document.querySelector('.mb[data-m="'+w.m+'"]');if(t)t.classList.add('ac');var k=cm+'_'+ci;delete ans[k+'_g'];sv();us();show();};

window.pickRandom=function(){var d=data();if(d.length<=1){ci=0;return;}var used=cleanSeen(cm);if(used.length>=d.length)used=[];var pool=[];for(var i=0;i<d.length;i++){if(used.indexOf(i)<0&&i!==ci)pool.push(i);}if(pool.length===0){for(var j=0;j<d.length;j++){if(used.indexOf(j)<0)pool.push(j);}}if(pool.length===0){used=[];for(var k=0;k<d.length;k++){if(k!==ci)pool.push(k);}}seen[cm]=used;ci=pool[Math.floor(Math.random()*pool.length)];sv();};
window.pv=function(){pickRandom();show();};
window.nx=function(){pickRandom();show();};
window.rd=function(){pickRandom();show();};
window.clrW=function(){if(confirm('清空错题本？')){WL=[];sv();us();if(cm==='wrong')showWL();}};

document.addEventListener('keydown',function(e){if(cm==='wrong')return;if(e.key==='ArrowRight'||e.key==='ArrowUp'||e.key==='ArrowLeft')nx();});
window.onload=init;
</script>
</body>
</html>
